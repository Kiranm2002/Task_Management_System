version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file: ./backend/.env
    environment:
      - NODE_ENV=production
      

  frontend:
    build: 
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:5000/api
    ports:
      - "5173:80" 
    depends_on:
      - backend